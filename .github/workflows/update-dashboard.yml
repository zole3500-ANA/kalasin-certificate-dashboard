name: Update dashboard

on:
  schedule:
    # Run every hour at minute 5 while avoiding the crowded :00 slot.
    - cron: "5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rebuild dashboard
        run: python build_kalasin_certificate_dashboard.py

      - name: Commit updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html kalasin-certificate-dashboard-data.json
          if git diff --cached --quiet; then
            echo "No dashboard changes to commit."
          else
            git commit -m "Update dashboard data"
            git push
          fi
